<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard de Métricas del Proyecto</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f6f8fa;
      color: #24292f;
    }

    h1 {
      margin-bottom: 10px;
    }

    .subtitle {
      color: #57606a;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border: 1px solid #d0d7de;
    }

    .label {
      font-size: 14px;
      color: #57606a;
    }

    .value {
      font-size: 30px;
      font-weight: bold;
      margin-top: 8px;
    }

    .risk {
      font-weight: bold;
    }

    footer {
      margin-top: 32px;
      color: #57606a;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>Dashboard de Métricas del Proyecto</h1>
  <p class="subtitle">Indicadores generados automáticamente desde GitHub Issues.</p>

  <div class="grid" id="metrics"></div>

  <footer>
    Flujo de medición: Issues → GitHub Project → GitHub Actions → metrics.json → Dashboard → Decisiones.
  </footer>

  <script>
    const labels = {
      total_issues: "Total de tareas",
      closed_issues: "Tareas cerradas",
      open_issues: "Tareas abiertas",
      completion_rate_percent: "Avance (%)",
      total_bugs: "Bugs totales",
      open_bugs: "Bugs abiertos",
      closed_bugs: "Bugs cerrados",
      average_resolution_hours: "Tiempo promedio de resolución (h)",
      estimated_hours: "Horas estimadas",
      actual_hours: "Horas reales",
      estimated_cost_usd: "Costo estimado (USD)",
      actual_cost_usd: "Costo real (USD)",
      cost_variance_usd: "Variación de costo (USD)",
      roi_percent: "ROI (%)",
      velocity_story_points: "Velocity",
      overdue_open_issues: "Tareas vencidas",
      risk_level: "Nivel de riesgo"
    };

    fetch("metrics.json")
      .then(response => response.json())
      .then(data => {
        const container = document.getElementById("metrics");

        Object.entries(labels).forEach(([key, label]) => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <div class="label">${label}</div>
            <div class="value">${data[key]}</div>
          `;

          container.appendChild(card);
        });
      })
      .catch(error => {
        document.getElementById("metrics").innerHTML =
          "<p>No fue posible cargar el archivo metrics.json.</p>";
        console.error(error);
      });
  </script>
</body>
</html>
